# One-command local deployment.
#
#   docker compose up --build
#
# Brings up:
#   • ollama  — serves Gemma 4 on port 11434 (model auto-pulled on first run)
#   • backend — FastAPI on port 8000, configured to talk to the ollama service
#   • frontend — Next.js on port 3000, pointed at the backend
#
# The default model is gemma4:e4b (~3GB). Override AYU_MODEL_ID and OLLAMA_MODEL
# to use the 26B-A4B MoE or 31B dense variants if you have the VRAM.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
    entrypoint: ["sh", "-c", "ollama pull \"$$OLLAMA_MODEL\""]
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      AYU_BACKEND: ollama
      AYU_MODEL_ID: ${AYU_MODEL_ID:-google/gemma-4-E4B-it}
      AYU_OLLAMA_HOST: http://ollama:11434
      AYU_ALLOW_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      ollama-pull:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AYU_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  ollama_models:
